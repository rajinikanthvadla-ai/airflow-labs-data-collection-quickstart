# Airflow Helm Chart 1.21.0 / Airflow 3.2.0
# Docs: https://airflow.apache.org/docs/helm-chart/stable/index.html
#
# Build image first:
#   docker build -t airflow-lab:local .
#   kind load docker-image airflow-lab:local --name airflow-lab

images:
  airflow:
    repository: airflow-lab
    tag: local
    pullPolicy: Never

executor: "CeleryExecutor"

config:
  core:
    load_examples: "False"

# ---------------------------------------------------------------------------
# Git-sync: pulls DAGs from GitHub into all Airflow pods every 60s
# ---------------------------------------------------------------------------
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/rajinikanthvadla-ai/airflow-labs-data-collection-quickstart.git
    branch: main
    ref: main
    rev: HEAD
    depth: 1
    maxFailures: 0
    subPath: "dags"
    wait: 60
    containerName: git-sync
    uid: 65533

    # --- For PRIVATE repos: create secret then uncomment ---
    # credentialsSecret: git-credentials

# ---------------------------------------------------------------------------
# Default admin user  (login: admin / admin)
# ---------------------------------------------------------------------------
createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
  defaultUser:
    role: Admin
    username: admin
    email: admin@example.com
    firstName: admin
    lastName: admin
    password: admin

migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false

# ---------------------------------------------------------------------------
# Component scaling
# ---------------------------------------------------------------------------
workers:
  replicas: 1

triggerer:
  enabled: true

flower:
  enabled: false
