# Required for S3 output: helm upgrade --install ... -f helm/airflow-values.yaml -f helm/workers-s3-secret.yaml
# Secret aws-s3-creds must contain AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION, S3_BUCKET, and optional S3_PREFIX.
workers:
  extraEnvFrom:
    - secretRef:
        name: aws-s3-creds
