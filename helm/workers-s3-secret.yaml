# Optional: inject AWS env vars from a Kubernetes secret into ALL Airflow
# components.  This is an alternative to setting Airflow Variables in the UI.
#
# Create the secret first:
#   kubectl create secret generic aws-s3-creds -n airflow \
#     --from-literal=AWS_ACCESS_KEY_ID=YOUR_KEY \
#     --from-literal=AWS_SECRET_ACCESS_KEY=YOUR_SECRET \
#     --from-literal=AWS_DEFAULT_REGION=us-east-1 \
#     --from-literal=S3_BUCKET=YOUR_BUCKET \
#     --from-literal=S3_PREFIX=airflow-collected
#
# The DAGs now read from Airflow Variables (Admin -> Variables in the UI),
# so this file is optional.  Use it only if you prefer env-var injection.

workers:
  extraEnvFrom:
    - secretRef:
        name: aws-s3-creds

scheduler:
  extraEnvFrom:
    - secretRef:
        name: aws-s3-creds

webserver:
  extraEnvFrom:
    - secretRef:
        name: aws-s3-creds
